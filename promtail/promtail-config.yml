server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: spring-boot-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: spring-logs
          environment: development
          app: ms-orders-api
          __path__: /var/log/spring/*.log  # Ruta dentro del contenedor de Promtail

    # === AQUÍ AGREGAMOS LA EXTRACCIÓN DEL TRACE ID ===
    pipeline_stages:
      # Expresión regular que busca el formato estándar de Spring Boot 3: [nombre-app,traceId,spanId]
      - regex:
          expression: '\[(?P<spring_app>[^,]*),(?P<traceId>[^,]*),(?P<spanId>[^\]]*)\]'
      # Le decimos a Promtail que exponga el traceId y spanId como campos estructurados en Loki
      - labels:
          traceId:
          spanId: